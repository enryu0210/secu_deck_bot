# =====================================================================
# Chief of Staff — Railway 서비스 설정 (Phase 3)
# ---------------------------------------------------------------------
# cos 자체는 외부 HTTP 서버 X. 디스코드 게이트웨이 연결만.
# 다른 봇 4개의 internal API 를 *호출* 하므로
# 같은 Railway 프로젝트의 internal hostname 환경변수가 필요:
#   BOT_URL_PITCH=http://pitch-sharpener.railway.internal:${PORT_PITCH}
#   BOT_URL_CODE=...
#   BOT_URL_INTERVIEW=...
#   BOT_URL_DESIGN=...
#   INTERNAL_API_SECRET=<랜덤 64자>
# =====================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "bots/chief_of_staff/Dockerfile"

[deploy]
startCommand = "uv run python -m chief_of_staff.main"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
