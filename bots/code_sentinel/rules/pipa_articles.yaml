# 개인정보보호법 (PIPA) 주요 조항.
# 신규 기능이 어떤 조항에 해당하는지 매핑할 때 참조.

articles:
  - id: PIPA_15
    title: 개인정보의 수집·이용
    summary: |
      개인정보는 수집·이용 목적, 항목, 보유·이용 기간을 명확히 고지하고 동의 후 수집.
      목적 외 사용 금지. 동의 철회 절차 제공.
    triggers:
      - 회원가입 / 로그인
      - 사용자 입력 폼 (이름·이메일·전화번호 등)
      - 위탁자 자료 업로드

  - id: PIPA_17
    title: 개인정보의 제공
    summary: |
      제3자 제공 시 별도 동의. 위탁(처리 위임)과 제공(소유권 이전)을 구분.
    triggers:
      - 외부 LLM API 호출 (PII 포함 시)
      - 분석 도구·CDN 사용
      - 위탁자 ↔ 수탁사 자료 공유

  - id: PIPA_21
    title: 개인정보의 파기
    summary: |
      보유 기간 경과 또는 처리 목적 달성 시 지체 없이(5일 이내) 파기.
      복구 불가능한 방법 사용. 종이 문서는 분쇄·소각.
    triggers:
      - 회원 탈퇴
      - 보관 기간 만료
      - 사용자 삭제 요청

  - id: PIPA_24
    title: 고유식별정보의 처리 제한
    summary: |
      주민등록번호·여권·운전면허·외국인등록번호는 법령 근거 또는 별도 동의 필수.
      암호화 저장 의무.
    triggers:
      - 본인 인증
      - 위탁 계약 관련 신원 확인

  - id: PIPA_29
    title: 안전조치 의무
    summary: |
      KISA 안전성 확보조치 기준 준수. 암호화·접근 통제·접속 기록·악성코드 대응 등.
    triggers:
      - 모든 PII 처리 코드
      - 인프라·보안 정책 변경

  - id: PIPA_34
    title: 개인정보 유출 통지
    summary: |
      유출 인지 시 72시간 내 정보주체에게 통지 + 행정안전부에 신고.
      대상: 1천명 이상 유출 또는 민감정보 / 고유식별정보 유출.
    triggers:
      - 사고 대응 절차
      - 모니터링 / 알림 시스템
