# =====================================================================
# Argos 가설 카탈로그
# ---------------------------------------------------------------------
# Interview Companion 봇이 인터뷰 가이드를 만들고 결과를 분류할 때 쓰는
# "검증 대상 가설 목록". Argos_Context.md 에서 추출했고, 인터뷰 진행 중
# 새 가설이 생기면 이 파일에 추가만 하면 됨 (봇 재시작 불필요 — mtime 감지).
#
# priority 1 = 사업계획서 재지원 전 반드시 검증해야 함
# priority 2 = 8월 베타 전까지 검증 권장
# =====================================================================

hypotheses:
  - id: H1_subcontractor_risk
    statement: 수탁사 보안 점검 통과 실패 시 계약 해지·위탁자 신뢰 손상 위험이 실제 존재한다
    priority: 1
    related_features:
      - 점검_자동진단
      - 시정조치_리포트
    sample_questions:
      - 작년 위탁자 보안 점검 결과는 어땠나요? 미흡 항목이 있었다면 어떻게 대응하셨나요?
      - 점검 결과가 안 좋았을 때 위탁자 측 반응은 어땠나요?
      - 점검 통과 여부가 실제 계약 갱신에 영향을 준 사례가 있나요?

  - id: H2_existing_solutions_unfit
    statement: 30인 규모 위탁사가 사용할 만한 보안 도구가 시장에 부족하다
    priority: 2
    related_features:
      - 경량_PC앱
      - SaaS_대시보드
    sample_questions:
      - 도입을 검토했지만 결국 안 쓴 보안 도구가 있나요? 이유는?
      - 현재 쓰는 보안 도구 중 가장 불편한 점은 무엇인가요?
      - 무제한 예산이 있다면 어떤 보안 도구를 쓰고 싶으세요?

  - id: H3_pricing_120k
    statement: 월 12만원 이하 가격이면 30인 규모 위탁사가 도입 의사 있다
    priority: 1
    related_features:
      - 구독_과금
    sample_questions:
      - 만약 KISA 점검 항목을 자동 진단하는 SaaS가 월 12만원이라면 도입을 고려하시겠어요?
      - 월 30만원 미만 결재는 누구의 권한인가요? 의사결정 사이클은?
      - 도입 결정에 영향을 주는 다른 비용 (PoC, 도입 컨설팅) 이 있나요?

  - id: H4_compliance_report_burden
    statement: 위탁자 요구 시정 조치 보고서 작성이 가장 큰 운영 부담이다
    priority: 1
    related_features:
      - 리포트_자동생성
    sample_questions:
      - 위탁자에게 정기적으로 제출하는 보안 관련 문서가 있나요? 작성 시간은 얼마나 걸리나요?
      - 시정 조치 보고서를 작성할 때 가장 어려운 부분은 무엇인가요?
      - 자동 생성된 리포트를 그대로 쓸 수 있을까요, 아니면 항상 수정이 필요한가요?

  - id: H5_no_dedicated_security_staff
    statement: 30인 규모 위탁사 대다수가 전담 보안 담당자 없이 IT 담당자가 보안을 겸직한다
    priority: 2
    related_features:
      - 자동화_점검
      - 가이드형_UI
    sample_questions:
      - 회사에서 보안 업무를 전담하는 인원이 따로 있나요?
      - 보안 관련 업무에 평균 몇 시간을 쓰시나요?
      - 보안 도구 운영을 위해 별도 교육을 받으신 적 있나요?

  - id: H6_pc_agent_acceptance
    statement: 위탁사 직원들이 회사 PC 에 보안 에이전트 설치를 거부감 없이 받아들인다
    priority: 1
    related_features:
      - 경량_PC앱
    sample_questions:
      - 회사 PC 에 모니터링 도구를 설치한 경험이 있나요? 직원들 반응은 어땠나요?
      - 에이전트 설치 시 가장 큰 우려 사항은 무엇인가요? (성능 / 사생활 / 관리 부담)
      - 노트북 BYOD 정책은 어떻게 운영하세요?
