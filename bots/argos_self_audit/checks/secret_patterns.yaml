# =====================================================================
# 하드코딩 시크릿 패턴 — repo_scanner 가 정규식으로 매칭.
# false_positive_excludes 에 매칭되면 무시 (테스트 픽스처·예시 코드 등).
# =====================================================================
patterns:
  - id: openai_key
    severity: CRITICAL
    description: "OpenAI API 키가 코드에 직접 노출되어 있음"
    regex: 'sk-(?:proj-)?[A-Za-z0-9_-]{32,}'
    suggestion: "환경변수(OPENAI_API_KEY) 로 옮기고 즉시 키를 무효화·재발급."

  - id: anthropic_key
    severity: CRITICAL
    description: "Anthropic API 키가 코드에 직접 노출되어 있음"
    regex: 'sk-ant-[A-Za-z0-9_\-]{50,}'
    suggestion: "환경변수(ANTHROPIC_API_KEY) 로 옮기고 즉시 키를 무효화·재발급."

  - id: aws_access_key
    severity: CRITICAL
    description: "AWS Access Key ID 가 코드에 직접 노출됨"
    regex: 'AKIA[0-9A-Z]{16}'
    suggestion: "IAM 콘솔에서 즉시 비활성화·삭제. 환경변수 또는 AWS Secrets Manager 사용."

  - id: aws_secret_key
    severity: CRITICAL
    description: "AWS Secret Access Key 노출 의심 (변수명에 aws 가 들어갈 때만 매칭)"
    # 'aws_secret_access_key' / 'AWS_SECRET' 같은 변수명 부근에 40자 base64 문자열이
    # 평문으로 할당된 패턴. 광범위 매칭이라 다언어 가능성 위해 case-insensitive 플래그.
    regex: '(?i)aws[_a-z0-9]{0,30}(?:secret|key)[^=:\n]{0,30}[:=]\s*[''"]?[A-Za-z0-9/+=]{40}[''"]?'
    suggestion: "Access Key 와 함께 노출됐을 가능성 높음. 즉시 회전·재발급."

  - id: github_pat_classic
    severity: HIGH
    description: "GitHub classic PAT 노출"
    regex: 'ghp_[A-Za-z0-9]{36}'
    suggestion: "GitHub 설정 > Developer settings > Personal access tokens 에서 즉시 revoke."

  - id: github_pat_fine_grained
    severity: HIGH
    description: "GitHub fine-grained PAT 노출"
    regex: 'github_pat_[A-Za-z0-9_]{80,}'
    suggestion: "즉시 revoke 후 재발급. fine-grained 는 repo 단위 권한 재설정 필요."

  - id: google_api_key
    severity: HIGH
    description: "Google API 키 노출"
    regex: 'AIza[0-9A-Za-z\-_]{35}'
    suggestion: "GCP 콘솔에서 즉시 키 회전. 가능하면 service account + IAM 으로 전환."

  - id: slack_webhook
    severity: HIGH
    description: "Slack Incoming Webhook URL 노출"
    regex: 'https://hooks\.slack\.com/services/T[A-Za-z0-9]+/B[A-Za-z0-9]+/[A-Za-z0-9]+'
    suggestion: "Slack 앱 설정에서 즉시 webhook 재발급."

  - id: private_key_pem
    severity: CRITICAL
    description: "PEM 형식 개인키가 레포에 커밋됨"
    regex: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
    suggestion: "git history 에서 BFG 등으로 제거. 키 즉시 폐기·재발급."

  - id: hardcoded_password_eq
    severity: HIGH
    description: "코드에 password/passwd/pwd = '...' 식 평문 비밀번호 의심"
    regex: '(?i)(password|passwd|pwd)\s*[:=]\s*[''"][^''"\s]{8,}[''"]'
    suggestion: "환경변수 또는 secret manager 사용. 테스트 더미면 'TEST_' 접두사 권장."

  - id: db_url_with_password
    severity: HIGH
    description: "DB 접속 URL 에 비밀번호가 포함된 채 커밋됨"
    regex: '(?i)(?:postgres|mysql|mongodb)(?:\+\w+)?://[^:\s]+:[^@\s]{4,}@'
    suggestion: "URL 을 환경변수(DATABASE_URL) 로 옮기고 평문 커밋 회수."

# false positive 제외 — 파일 경로(POSIX 형식)에 아래 키워드가 있으면 finding 무시.
# 봇은 Path.as_posix() 결과를 검사하므로 OS 무관.
false_positive_excludes:
  path_substrings:
    - "/tests/"
    - "/test/"
    - "/__tests__/"
    - "/fixtures/"
    - "/examples/"
    - "/.env.example"
    - "/CHANGELOG"
    - "/README"
    - "/docs/"
