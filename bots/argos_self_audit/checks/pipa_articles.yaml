# =====================================================================
# 개인정보보호법 (PIPA) 핵심 조항 + 키워드 매핑.
# compliance_mapper 가 PRD 본문의 키워드를 보고 관련 조항을 매핑.
# LLM 없이도 90% 케이스를 잡도록 키워드를 풍부하게 큐레이션.
# =====================================================================
articles:
  - id: art_15
    title: "제15조 — 개인정보의 수집·이용"
    summary: "정보주체 동의 또는 법령 근거 하에서만 수집·이용 가능. 수집 목적·항목·보유기간 명시 의무."
    keywords:
      - "수집"
      - "동의"
      - "회원가입"
      - "이용약관"
      - "개인정보 처리방침"
      - "정보주체"
    must_have_in_prd:
      - "수집 목적"
      - "보유 기간"
      - "동의 방식"

  - id: art_17
    title: "제17조 — 개인정보의 제공"
    summary: "제3자 제공은 별도 동의 + 제공받는 자·목적·항목 고지 의무."
    keywords:
      - "제3자"
      - "제공"
      - "공유"
      - "API 연동"
      - "외부 전송"
      - "위탁"
    must_have_in_prd:
      - "제공받는 자"
      - "제공 목적"
      - "제공 항목"

  - id: art_21
    title: "제21조 — 개인정보의 파기"
    summary: "보유기간 경과·처리목적 달성 시 지체 없이 파기. 복구 불가능 방법으로."
    keywords:
      - "파기"
      - "삭제"
      - "보관 기간"
      - "보유 기간"
      - "로그 보관"
      - "활동 로그"
      - "이력"
      - "90일"
      - "1년"
    must_have_in_prd:
      - "자동 파기 메커니즘"
      - "파기 로그"
      - "복구 불가능 처리"

  - id: art_22
    title: "제22조 — 동의를 받는 방법"
    summary: "동의는 명확하게 구분 표시. 필수·선택 동의 분리. 14세 미만 법정대리인 동의."
    keywords:
      - "동의"
      - "필수 동의"
      - "선택 동의"
      - "체크박스"
      - "14세"
      - "미성년자"
    must_have_in_prd:
      - "필수/선택 분리"
      - "철회 절차"

  - id: art_23
    title: "제23조 — 민감정보의 처리 제한"
    summary: "사상·신념·노조·정치·건강·성생활·유전·범죄경력 등은 별도 동의 + 강화된 보호."
    keywords:
      - "민감정보"
      - "건강"
      - "병력"
      - "유전"
      - "성생활"
      - "사상"
      - "정치"
      - "범죄경력"
    must_have_in_prd:
      - "민감정보 별도 동의"
      - "암호화 저장"

  - id: art_24
    title: "제24조 — 고유식별정보의 처리 제한"
    summary: "주민번호·여권번호·운전면허·외국인등록번호는 법령 근거 없이 처리 금지."
    keywords:
      - "주민등록번호"
      - "여권번호"
      - "운전면허"
      - "외국인등록"
      - "고유식별"
    must_have_in_prd:
      - "법령 근거"
      - "암호화 저장"
      - "최소 수집"

  - id: art_28_2
    title: "제28조의2 — 가명정보의 처리"
    summary: "통계작성·과학연구·공익 기록보존 목적은 가명처리로 동의 없이 처리 가능."
    keywords:
      - "가명정보"
      - "가명처리"
      - "통계"
      - "연구"
      - "분석"
      - "익명화"
    must_have_in_prd:
      - "재식별 방지 조치"
      - "추가 정보 분리 보관"

  - id: art_29
    title: "제29조 — 안전성 확보 조치"
    summary: "내부관리계획·접근통제·접근권한제한·접속기록 보관·암호화·취약점 점검 의무."
    keywords:
      - "암호화"
      - "접근 통제"
      - "접근 권한"
      - "접속 기록"
      - "감사 로그"
      - "백업"
      - "취약점 점검"
      - "안전성 확보"
    must_have_in_prd:
      - "암호화 알고리즘 (AES-256-GCM 등)"
      - "접근 로그 1년 보관"
      - "권한 분리"

  - id: art_30
    title: "제30조 — 개인정보 처리방침 수립·공개"
    summary: "수집 항목·이용 목적·보유기간·제3자 제공·처리 위탁·권리행사 방법 명시."
    keywords:
      - "처리방침"
      - "프라이버시 정책"
      - "privacy policy"
      - "이용약관"
    must_have_in_prd:
      - "공개 위치"
      - "변경 시 고지 절차"

  - id: art_35
    title: "제35조 — 개인정보의 열람"
    summary: "정보주체는 자기정보 열람 요구 가능. 처리자는 10일 내 회신 의무."
    keywords:
      - "열람"
      - "내 정보 보기"
      - "마이페이지"
      - "data export"
      - "다운로드"
    must_have_in_prd:
      - "/api/user/data 등 열람 엔드포인트"

  - id: art_36
    title: "제36조 — 개인정보의 정정·삭제"
    summary: "정보주체 정정·삭제 요구 시 지체 없이 처리. 다른 법령 보존 의무 시 거부 가능."
    keywords:
      - "정정"
      - "수정"
      - "탈퇴"
      - "회원 탈퇴"
      - "삭제 요청"
      - "잊혀질 권리"
    must_have_in_prd:
      - "탈퇴 플로우"
      - "삭제 후 백업 처리"

  - id: art_39_3
    title: "제39조의3 — 개인정보 유출 통지"
    summary: "유출 인지 24시간 내 정보주체 통지 + 72시간 내 개인정보보호위원회 신고 (1천명 이상 시)."
    keywords:
      - "유출"
      - "사고"
      - "침해"
      - "breach"
      - "incident"
    must_have_in_prd:
      - "유출 감지 알람"
      - "통지 절차"
      - "신고 담당자"

