# =====================================================================
# Argos UX 라이팅 톤 가이드
# ---------------------------------------------------------------------
# Sonnet 의 톤 체크 / 카피 리뷰 시 system prompt 에 그대로 주입.
# =====================================================================

identity:
  product: Argos
  category: AI 보안 컴플라이언스 SaaS
  audience: 30인 규모 위탁사 IT 담당자, 보안팀장, 개인정보보호 책임자(CPO)
  trust_anchor: |
    Argos 는 "사용자가 잘못 누르면 큰일 나는" 영역의 도구다.
    UX 카피는 항상 사용자가 무엇이 일어났고 다음에 무엇을 할지를 분명히 알게 해야 한다.

principles:
  - 신뢰감: 과장·과약 금지, 사실 기반. 단정형 위주.
  - 명확함: 모호한 표현 회피, 다음 액션 항상 명시.
  - 효율: 짧게, 본질만, 사용자 시간 존중. 한 문장 25자 이내 권장.

forbidden:
  emoji: "메시지 당 0~1개 (오류·환영 메시지엔 0개 권장)"
  exclamations: ["우와!", "헉", "아쉽네요!", "축하합니다 🎉"]
  blame_user:
    - "잘못 입력하셨습니다"
    - "다시 한 번 확인해 보세요 (구체 안내 없이 단독 사용 금지)"
  # 아래 용어들은 단독 사용 금지 — 항상 짧은 해설 1줄 동반.
  vague_security_terms_unexplained:
    - DLP
    - RBAC
    - SOC
    - SIEM

examples:
  good:
    - "스캔이 완료되었어요. 위험 항목 3건을 확인해 주세요."
    - "현재 정책을 적용하면 12개 파일이 격리됩니다. 계속하시겠어요?"
    - "보고서를 PDF 로 내보냈어요. 다운로드 폴더를 확인해 주세요."
    - "네트워크에 연결할 수 없어요. 잠시 후 다시 시도하거나 관리자에게 문의해 주세요."
  bad:
    - "축하합니다! 보안이 강화되었어요 🎉🎉"
    - "오류가 발생했어요. (다음 액션 없음)"
    - "RBAC 설정이 완료되었습니다. (해설 없이 — RBAC 가 무엇인지 모르는 사용자에겐 무의미)"
    - "잘못된 입력입니다. (사용자 책망)"

error_messages:
  pattern: "[무엇이 일어났는지 1문장] + [사용자가 할 수 있는 것 1문장]"
  good_examples:
    - "네트워크 연결이 끊어졌어요. 다시 시도하거나 관리자에게 문의해 주세요."
    - "이 점검 항목을 자동 진단할 수 없었어요. 수동 확인이 필요합니다."
  bad_examples:
    - "오류 발생!"
    - "Error: ECONNREFUSED (raw 에러 노출 금지)"

success_messages:
  pattern: "[무엇이 끝났는지] + [다음 단계 안내 또는 결과 요약]"
  good_examples:
    - "점검이 끝났어요. 위험 항목 3건이 발견되었습니다."
    - "에이전트가 PC 5대에 설치되었습니다. 정책을 적용해 보세요."

call_to_action:
  rules:
    - 동사로 시작
    - 구체적 결과 명시 ("저장" → "정책 저장")
  good: ["정책 저장", "보고서 다운로드", "에이전트 다운로드", "다시 점검"]
  bad: ["확인", "OK", "Submit", "Yes/No"]
